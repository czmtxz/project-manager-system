{% extends "nav_base.html" %}
{% block title %}导入发票 - 项目管理系统{% endblock %}
{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-file-earmark-excel"></i> Excel导入发票</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">选择Excel文件</label>
                            <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                        </div>
                        <div class="alert alert-info">
                            <strong>Excel格式要求：</strong>
                            <table class="table table-sm mt-2 mb-0">
                                <thead><tr><th>列A</th><th>列B</th><th>列C</th><th>列D</th><th>列E</th><th>列F</th><th>列G</th><th>列H</th></tr></thead>
                                <tbody><tr><td>发票号码*</td><td>类型</td><td>金额</td><td>税率%</td><td>税额</td><td>开票日期</td><td>合同编号</td><td>项目名称</td></tr></tbody>
                            </table>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-upload"></i> 导入</button>
                            <a href="{{ url_for('invoice_list') }}" class="btn btn-secondary">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
