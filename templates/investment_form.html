{% extends "nav_base.html" %}
{% block title %}新增投资 - 项目投资管理系统{% endblock %}
{% block content %}
<div class="container-fluid px-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-cash-stack"></i> 新增投资记录</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">选择项目 <span class="text-danger">*</span></label>
                            <select name="project_id" class="form-select" required>
                                <option value="">请选择项目...</option>
                                {% for p in projects %}
                                <option value="{{ p.id }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">投资人 <span class="text-danger">*</span></label>
                            <select name="participant_id" class="form-select" required>
                                <option value="">请选择投资人...</option>
                                {% for p in participants %}
                                <option value="{{ p.id }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">投资日期 <span class="text-danger">*</span></label>
                                    <input type="date" name="invest_date" class="form-control" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">投资金额 <span class="text-danger">*</span></label>
                                    <input type="number" name="amount" class="form-control" step="0.01" min="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">投资类型</label>
                                    <select name="invest_type" class="form-select">
                                        <option value="现金">现金</option>
                                        <option value="银行转账">银行转账</option>
                                        <option value="微信">微信</option>
                                        <option value="支付宝">支付宝</option>
                                        <option value="实物">实物</option>
                                        <option value="其他">其他</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">支付方式</label>
                                    <input type="text" name="payment_method" class="form-control" placeholder="如：工商银行转账">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">备注</label>
                            <textarea name="remark" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> 保存
                            </button>
                            <a href="{{ url_for('investment_list') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> 返回
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
