{% extends "base.html" %}
{% block title %}用户注册 - 项目管理系统{% endblock %}
{% block body %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-center"><i class="bi bi-person-plus"></i> 用户注册</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" name="username" class="form-control" required minlength="3" 
                                   placeholder="请输入用户名（至少3个字符）">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required minlength="6"
                                   placeholder="请输入密码（至少6个字符）">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <input type="password" name="confirm_password" class="form-control" required
                                   placeholder="请再次输入密码">
                        </div>
                        
                        <hr>
                        
                        <div class="mb-3">
                            <label class="form-label">真实姓名</label>
                            <input type="text" name="real_name" class="form-control" placeholder="请输入真实姓名">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">手机号</label>
                                <input type="tel" name="phone" class="form-control" placeholder="请输入手机号">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" name="email" class="form-control" placeholder="请输入邮箱">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">部门</label>
                            <input type="text" name="department" class="form-control" placeholder="请输入所属部门">
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 注册成功后需要管理员审批才能登录
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 提交注册
                            </button>
                            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> 返回登录
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
